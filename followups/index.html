<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Follow-ups · Neurofoco</title>
<meta name="description" content="Relatórios mensais de acompanhamento da Neurofoco.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..900,0..100;1,9..144,300..900,0..100&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F2EDE4;
  --ink: #1C1C1A;
  --accent: #C54A1B;
  --muted: #8A8477;
  --line: #D9D2C4;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body {
  background-image:
    radial-gradient(ellipse at 15% 10%, rgba(197, 74, 27, 0.06), transparent 55%),
    radial-gradient(ellipse at 85% 90%, rgba(28, 28, 26, 0.04), transparent 60%);
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.4;
  mix-blend-mode: multiply;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  z-index: 1;
}

.container {
  position: relative;
  z-index: 2;
  max-width: 1240px;
  margin: 0 auto;
  padding: 3rem 2.75rem 2.25rem;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: start;
  gap: 1rem;
  padding-bottom: 2.25rem;
  border-bottom: 1px solid var(--line);
  animation: fadeUp 0.9s ease-out;
}

.back {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--muted);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  transition: color 0.3s, gap 0.3s;
}

.back:hover {
  color: var(--accent);
  gap: 0.9rem;
}

.back::before {
  content: '\2190';
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1rem;
  line-height: 1;
}

.meta-right {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--muted);
  text-align: right;
}

.section-title {
  grid-column: 1 / -1;
  margin-top: 3.5rem;
  font-family: 'Fraunces', Georgia, serif;
  font-variation-settings: "SOFT" 30, "opsz" 144;
  font-weight: 400;
  font-size: clamp(3.2rem, 11vw, 8.5rem);
  line-height: 0.86;
  letter-spacing: -0.04em;
  color: var(--ink);
}

.section-title em {
  font-style: italic;
  font-variation-settings: "SOFT" 100, "opsz" 144;
  font-weight: 300;
  color: var(--accent);
}

.tagline {
  grid-column: 1 / -1;
  margin-top: 1.75rem;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  flex-wrap: wrap;
  gap: 1rem;
}

.tagline-text {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-size: 1.1rem;
  color: var(--muted);
  max-width: 42ch;
  line-height: 1.4;
}

.index-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  color: var(--muted);
  white-space: nowrap;
}

.years {
  flex: 1;
  margin-top: 4rem;
  display: flex;
  flex-direction: column;
  gap: 3rem;
}

.year {
  animation: fadeUp 0.9s ease-out backwards;
}

.year:nth-child(1) { animation-delay: 0.15s; }

.year-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.24em;
  color: var(--muted);
  padding-bottom: 0.9rem;
  border-bottom: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.year-count {
  font-size: 0.65rem;
  letter-spacing: 0.18em;
}

.month {
  display: grid;
  grid-template-columns: 70px 1fr auto 50px;
  align-items: center;
  gap: 2rem;
  padding: 1.9rem 0;
  border-bottom: 1px solid var(--line);
  text-decoration: none;
  color: inherit;
  position: relative;
  transition: padding 0.5s cubic-bezier(0.2, 0.85, 0.25, 1);
  overflow: hidden;
}

.month::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--ink);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.55s cubic-bezier(0.2, 0.85, 0.25, 1);
  z-index: 0;
}

.month > * { position: relative; z-index: 1; }

.month:hover {
  padding-left: 1.75rem;
  padding-right: 1.75rem;
  color: var(--bg);
}

.month:hover::before { transform: scaleX(1); }

.month:hover .num,
.month:hover .desc,
.month:hover .date { color: rgba(242, 237, 228, 0.6); }

.month:hover .title { color: var(--bg); }

.month:hover .arrow {
  color: var(--accent);
  transform: translateX(10px);
}

.num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  color: var(--muted);
  letter-spacing: 0.05em;
  transition: color 0.45s;
}

.title-block {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.title {
  font-family: 'Fraunces', Georgia, serif;
  font-variation-settings: "SOFT" 50, "opsz" 144;
  font-size: clamp(1.5rem, 3vw, 2.15rem);
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1;
  transition: color 0.45s;
}

.title em {
  font-style: italic;
  font-weight: 300;
}

.desc {
  font-size: 0.72rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  transition: color 0.45s;
}

.date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  text-align: right;
  white-space: nowrap;
  transition: color 0.45s;
}

.arrow {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1.9rem;
  font-weight: 300;
  color: var(--ink);
  transition: transform 0.5s cubic-bezier(0.2, 0.85, 0.25, 1), color 0.45s;
  display: flex;
  align-items: center;
  justify-content: flex-end;
}

footer {
  margin-top: 4.5rem;
  padding-top: 1.6rem;
  border-top: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--muted);
  animation: fadeUp 0.9s ease-out 0.35s backwards;
}

footer a {
  color: var(--muted);
  text-decoration: none;
  transition: color 0.3s;
  border-bottom: 1px solid transparent;
  padding-bottom: 2px;
}

footer a:hover {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 760px) {
  .container { padding: 2rem 1.5rem; }
  .section-title { margin-top: 2.25rem; }
  .years { margin-top: 2.5rem; gap: 2rem; }
  .month {
    grid-template-columns: 42px 1fr 34px;
    gap: 1.1rem;
    padding: 1.45rem 0;
  }
  .month .date { display: none; }
  .month:hover {
    padding-left: 1rem;
    padding-right: 1rem;
  }
  footer {
    flex-direction: column;
    gap: 0.6rem;
    align-items: flex-start;
    margin-top: 3rem;
  }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <a class="back" href="../">Voltar &mdash; Neurofoco</a>
    <span class="meta-right">Seção &middot; 02</span>
    <h1 class="section-title">Follow-<em>ups</em></h1>
    <div class="tagline">
      <p class="tagline-text">Relatórios mensais de acompanhamento, organizados por ano.</p>
      <span class="index-label">01 relatório disponível</span>
    </div>
  </header>

  <main class="years">
    <section class="year">
      <div class="year-label">
        <span>Ano &middot; 2026</span>
        <span class="year-count">01 item</span>
      </div>
      <a class="month" href="./marco2026/">
        <span class="num">01</span>
        <div class="title-block">
          <span class="title"><em>Março</em> 2026</span>
          <span class="desc">Relatório de acompanhamento</span>
        </div>
        <span class="date">&mdash; Mar &middot; 2026</span>
        <span class="arrow">&rarr;</span>
      </a>
    </section>
  </main>

  <footer>
    <span><a href="https://github.com/PsicomyApp/neurofoco">psicomyapp / neurofoco</a></span>
    <span>Publicado via GitHub Pages</span>
  </footer>
</div>
</body>
</html>
